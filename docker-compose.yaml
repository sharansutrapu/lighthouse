services:
  lighthouse:
    build: .
    container_name: lighthouse
    ports:
      - "8888:8000"
    environment:
      - DB_PATH=${DB_PATH:-/app/data/lighthouse.db}
      - SECRET_KEY=${SECRET_KEY:-secret-key-change-this}
      - DISABLE_AUTH=${DISABLE_AUTH:-false}
      - ALLOW_START=${ALLOW_START:-false}
      - ALLOW_STOP=${ALLOW_STOP:-false}
      - ALLOW_RESTART=${ALLOW_RESTART:-false}
      - ALLOW_DELETE=${ALLOW_DELETE:-false}
      - ALLOW_SHELL=${ALLOW_SHELL:-false}
      - EXCLUDE_CONTAINERS=${EXCLUDE_CONTAINERS:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - CLIENT_ACCESS=${CLIENT_ACCESS:-strict}
      - TRUST_PROXY=${TRUST_PROXY:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Named volume ensures ALL data (DB, metrics, settings, audit logs, users)
      # persists across container restarts, image upgrades and docker-compose down/up.
      # DO NOT change this to a bind mount (./data) unless you understand the implications.
      - lighthouse-data:/app/data
    restart: unless-stopped

# Named volume: managed by Docker, survives container recreation and upgrades.
# To back up: docker run --rm -v lighthouse-data:/data -v $(pwd):/backup alpine \
#   tar czf /backup/lighthouse-data-backup.tar.gz -C /data .
volumes:
  lighthouse-data:

